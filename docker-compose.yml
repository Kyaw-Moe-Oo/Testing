services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: testing
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    networks:
      - testing-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: testing-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - testing-network
  
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: testing-phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - testing-network

volumes:
  db_data:

networks:
  testing-network:
